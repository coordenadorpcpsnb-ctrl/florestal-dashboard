<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard de Inteligência de Mercado — Setor Florestal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #faf9f5; --fg: #1c2433; --card: #ffffff; --muted: #6b7585;
    --border: #e8e9ec; --navy: #1e2a44; --navy2: #2b3a55; --emerald: #2f8a5f; --amber: #d99021;
    --bordeaux: #b23636; --blue: #5b7299; --radius: 10px;
    --sidebar: #fbfbf9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--fg); font-feature-settings: 'cv11','ss01'; line-height: 1.45; overflow: hidden; }
  .tnum { font-variant-numeric: tabular-nums; }
  .shell { display: flex; height: 100vh; }

  /* Sidebar */
  aside { width: 215px; flex-shrink: 0; background: var(--sidebar); border-right: 1px solid var(--border); padding: 16px 12px; display: flex; flex-direction: column; }
  .brand { display: flex; align-items: center; gap: 9px; margin-bottom: 20px; padding: 4px 6px; }
  .brand-mark { width: 30px; height: 30px; border-radius: 8px; background: var(--navy); color: #fff; display: grid; place-items: center; }
  .brand-name { font-weight: 700; font-size: 13px; letter-spacing: -0.01em; line-height: 1.1; }
  .brand-sub { font-size: 10px; color: var(--muted); }
  nav { flex: 1; }
  nav button { display: flex; align-items: center; gap: 10px; padding: 8px 11px; border-radius: 7px; color: var(--muted); font-size: 12.5px; font-weight: 500; margin-bottom: 1px; cursor: pointer; width: 100%; border: none; background: none; text-align: left; font-family: inherit; transition: all .12s; }
  nav button:hover { background: #eeeeea; color: var(--fg); }
  nav button.active { background: var(--navy); color: #fff; font-weight: 600; }
  nav button svg { width: 15px; height: 15px; flex-shrink: 0; opacity: .9; }
  .nav-foot { font-size: 10px; color: var(--muted); padding: 12px 8px 2px; border-top: 1px solid var(--border); line-height: 1.7; }
  .nav-foot .lbl { text-transform: uppercase; letter-spacing: .08em; font-weight: 700; font-size: 9px; }
  .nav-foot .em { color: var(--navy2); font-weight: 700; }

  main { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100vh; }
  header.topbar { display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 28px 14px; border-bottom: 1px solid var(--border); background: var(--card); flex-shrink: 0; gap: 16px; }
  .crumb { font-size: 9.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 700; margin-bottom: 5px; }
  .crumb .sep { opacity: .5; margin: 0 5px; }
  header.topbar h1 { font-size: 19px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.1; }
  header.topbar .psub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .topbar-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .pill { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 6px 11px; border-radius: 7px; border: 1px solid var(--border); background: var(--card); color: var(--fg); cursor: default; }
  .btn { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 6px 12px; border-radius: 7px; border: 1px solid var(--border); background: var(--card); color: var(--fg); cursor: pointer; font-family: inherit; transition: all .12s; }
  .btn:hover { background: #f2f1ec; }
  .btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
  .btn.primary:hover { background: #15203a; }
  .btn svg, .pill svg { width: 13px; height: 13px; }
  .led { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .led.live { background: var(--emerald); box-shadow: 0 0 0 3px #2f8a5f25; }
  .led.offline { background: var(--amber); }
  .led.loading { background: var(--blue); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .content { flex: 1; overflow-y: auto; padding: 22px 28px 40px; }
  .view { display: none; }
  .view.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none} }
  .sec-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .11em; color: var(--blue); font-weight: 700; margin: 0 0 12px; }

  /* Exec banner */
  .exec { background: linear-gradient(135deg, var(--navy), #34466a); color: #fff; border-radius: var(--radius); padding: 20px 24px; margin-bottom: 20px; }
  .exec .eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: .14em; opacity: .72; font-weight: 700; margin-bottom: 8px; }
  .exec h2 { font-size: 18px; font-weight: 800; line-height: 1.35; letter-spacing: -0.02em; max-width: 880px; margin-bottom: 10px; }
  .exec p { font-size: 12.5px; opacity: .9; max-width: 880px; }
  .exec b { font-weight: 700; }

  /* Analysis box (light) */
  .analysis { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 16px; }
  .analysis .eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--navy2); font-weight: 700; margin-bottom: 9px; }
  .analysis h3 { font-size: 16px; font-weight: 800; letter-spacing: -0.02em; color: var(--fg); margin-bottom: 8px; }
  .analysis h3 svg { width: 15px; height: 15px; vertical-align: -2px; margin-right: 3px; color: var(--navy2); }
  .analysis p { font-size: 12.5px; color: var(--muted); line-height: 1.6; max-width: 1000px; }
  .analysis p b { color: var(--fg); font-weight: 700; }
  .analysis h3 svg { width: 16px; height: 16px; vertical-align: -2px; margin-right: 2px; }
  .analysis h3 svg { width: 15px; height: 15px; vertical-align: -2px; margin-right: 2px; color: var(--navy2); }

  /* KPI grid */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px 16px; transition: box-shadow .2s, transform .2s; }
  .kpi:hover { box-shadow: 0 8px 22px -14px #00000025; transform: translateY(-2px); }
  .kpi-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 11px; }
  .kpi-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; font-weight: 700; color: var(--muted); }
  .kpi-unit { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .badge { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; padding: 3px 7px; border-radius: 5px; border: 1px solid; white-space: nowrap; }
  .badge.ok { background: #2f8a5f15; color: var(--emerald); border-color: #2f8a5f30; }
  .badge.warning { background: #d9902118; color: var(--amber); border-color: #d9902135; }
  .badge.critical { background: #b2363615; color: var(--bordeaux); border-color: #b2363630; }
  .kpi-bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 8px; }
  .kpi-value { font-size: 25px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .kpi-trend { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; margin-top: 7px; }
  .kpi-trend.up { color: var(--amber); } .kpi-trend.down { color: var(--bordeaux); } .kpi-trend.stable { color: var(--muted); }
  .kpi-trend .vs { color: var(--muted); font-weight: 500; }
  .spark-wrap { width: 92px; height: 36px; flex-shrink: 0; position: relative; }
  .spark-wrap canvas { width: 100% !important; height: 100% !important; }
  .kpi-thresh { font-size: 9.5px; color: var(--muted); margin-top: 9px; padding-top: 8px; border-top: 1px dashed var(--border); }

  /* Panels & charts */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
  .panel.nomb { margin-bottom: 0; }
  .panel-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .panel-title { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
  .panel-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .panel-badge { font-size: 9.5px; font-weight: 700; color: var(--blue); background: #5b729915; padding: 4px 9px; border-radius: 6px; white-space: nowrap; }
  .chart-box { position: relative; height: 230px; }
  .chart-box.sm { height: 195px; }
  .chart-box.tall { height: 260px; }

  /* Stat cards */
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 14px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px 16px; }
  .stat .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }
  .stat .lbl svg { width: 13px; height: 13px; opacity: .7; }
  .stat .val { font-size: 21px; font-weight: 800; letter-spacing: -0.025em; }
  .stat .val.amber { color: var(--amber); } .stat .val.emerald { color: var(--emerald); } .stat .val.navy { color: var(--navy2); }
  .stat .sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

  /* Scenarios */
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 14px; }
  .scn { border: 1px solid var(--border); border-radius: var(--radius); padding: 17px; position: relative; }
  .scn.success { background: #f1f8f4; border-color: #2f8a5f30; }
  .scn.warning { background: #fdf7ec; border-color: #d9902130; }
  .scn.destructive { background: #fbf0f0; border-color: #b2363630; }
  .scn h4 { font-size: 13px; font-weight: 700; margin-bottom: 9px; }
  .scn .il { font-size: 9.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; margin-bottom: 3px; }
  .scn .imp { font-size: 17px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em; }
  .scn.success .imp { color: var(--emerald); } .scn.warning .imp { color: var(--amber); } .scn.destructive .imp { color: var(--bordeaux); }
  .scn .pl { font-size: 9.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; margin-bottom: 5px; }
  .scn ul { list-style: none; }
  .scn li { font-size: 11px; color: var(--fg); padding: 3px 0 3px 13px; position: relative; }
  .scn li::before { content: '•'; position: absolute; left: 0; }
  .scn.success li::before { color: var(--emerald); } .scn.warning li::before { color: var(--amber); } .scn.destructive li::before { color: var(--bordeaux); }
  .scn-icon { position: absolute; top: 15px; right: 15px; width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; }
  .scn.success .scn-icon { background: #2f8a5f1e; color: var(--emerald); }
  .scn.warning .scn-icon { background: #d990211e; color: var(--amber); }
  .scn.destructive .scn-icon { background: #b236361e; color: var(--bordeaux); }
  .scn-icon svg { width: 14px; height: 14px; }

  /* Count cards (gatilhos) */
  .count-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 14px; }
  .count { border: 1px solid; border-radius: var(--radius); padding: 16px 18px; }
  .count.ok { background: #f1f8f4; border-color: #2f8a5f30; }
  .count.warning { background: #fdf7ec; border-color: #d9902130; }
  .count.critical { background: #fbf0f0; border-color: #b2363630; }
  .count .cl { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; font-weight: 700; display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .count.ok .cl { color: var(--emerald); } .count.warning .cl { color: var(--amber); } .count.critical .cl { color: var(--bordeaux); }
  .count .cl svg { width: 13px; height: 13px; }
  .count .cv { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; }
  .count .cs { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; font-size: 9.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; padding: 9px 10px; border-bottom: 1px solid var(--border); }
  td { padding: 11px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .st { font-size: 9.5px; font-weight: 700; text-transform: uppercase; padding: 3px 9px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; border: 1px solid; }
  .st.ok { background: #2f8a5f12; color: var(--emerald); border-color: #2f8a5f30; }
  .st.warning { background: #d9902115; color: var(--amber); border-color: #d9902135; }
  .st.critical { background: #b2363612; color: var(--bordeaux); border-color: #b2363630; }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Callout box */
  .callout { background: #fdf7ec; border: 1px solid #d9902130; border-radius: var(--radius); padding: 16px 20px; margin-bottom: 14px; }
  .callout .ct { font-size: 12px; font-weight: 700; color: var(--amber); margin-bottom: 9px; display: flex; align-items: center; gap: 6px; }
  .callout .ct svg { width: 14px; height: 14px; flex-shrink: 0; }
  .callout .ct svg { width: 14px; height: 14px; flex-shrink: 0; }
  .callout .ct svg { width: 14px; height: 14px; flex-shrink: 0; }
  .callout ul { list-style: none; }
  .callout li { font-size: 11.5px; color: var(--fg); padding: 3px 0 3px 14px; position: relative; line-height: 1.5; }
  .callout li::before { content: '▸'; position: absolute; left: 0; color: var(--amber); }
  .callout li b { font-weight: 700; }
  .callout p { font-size: 11.5px; color: var(--muted); line-height: 1.6; }
  .callout p b { color: var(--fg); }

  /* Checklist */
  .checklist { list-style: none; }
  .checklist li { font-size: 11.5px; color: var(--fg); padding: 5px 0 5px 22px; position: relative; }
  .checklist li::before { content: '✓'; position: absolute; left: 0; color: var(--emerald); font-weight: 800; }

  /* References list */
  .reflist { list-style: none; }
  .refitem { display: flex; gap: 14px; padding: 12px 4px; border-bottom: 1px solid var(--border); }
  .refitem:last-child { border-bottom: none; }
  .refnum { font-size: 11px; color: var(--muted); font-weight: 700; width: 18px; flex-shrink: 0; padding-top: 2px; }
  .refbody { flex: 1; }
  .refsrc { font-size: 11px; font-weight: 700; color: var(--navy2); }
  .refdate { font-size: 10px; color: var(--muted); margin-left: 8px; font-weight: 500; }
  .reftitle { font-size: 12px; font-weight: 600; margin: 2px 0; }
  .refurl { font-size: 10px; color: var(--muted); word-break: break-all; }

  /* Simulator */
  .sim-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 18px; align-items: stretch; }
  .sim-sliders { display: flex; flex-direction: column; gap: 16px; justify-content: center; }
  .slider-row .sh { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .slider-row .sname { font-size: 12px; font-weight: 600; }
  .slider-row .sval { font-size: 12px; font-weight: 700; color: var(--navy2); }
  .slider-row .sval .su { font-size: 10px; color: var(--muted); font-weight: 500; margin-left: 3px; }
  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 5px; border-radius: 3px; background: var(--border); outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--navy); cursor: pointer; border: 2px solid #fff; box-shadow: 0 1px 4px #00000030; }
  input[type=range]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: var(--navy); cursor: pointer; border: 2px solid #fff; }
  .slider-row .sr { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); margin-top: 3px; }
  .sim-result { background: linear-gradient(135deg, var(--navy), #34466a); color: #fff; border-radius: var(--radius); padding: 22px; display: flex; flex-direction: column; justify-content: center; }
  .sim-result .rl { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; opacity: .75; font-weight: 700; margin-bottom: 8px; }
  .sim-result .rv { font-size: 34px; font-weight: 800; letter-spacing: -0.03em; }
  .sim-result .rd { font-size: 12px; margin-top: 8px; opacity: .9; }
  .sim-result .rd .chip { background: #ffffff22; padding: 2px 8px; border-radius: 5px; font-weight: 700; margin-left: 4px; }
  .sim-result .rb { font-size: 10.5px; opacity: .7; margin-top: 16px; line-height: 1.6; border-top: 1px solid #ffffff22; padding-top: 12px; }

  @media (max-width: 1100px) {
    body { overflow: auto; }
    .shell { flex-direction: column; height: auto; }
    aside { width: 100%; height: auto; }
    nav { display: flex; flex-wrap: wrap; gap: 4px; }
    nav button { width: auto; }
    main { height: auto; }
    .kpi-grid, .stat-row { grid-template-columns: repeat(2, 1fr); }
    .grid-2, .grid-3, .count-row, .sim-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

/* ---------- MODELO ECONÔMICO ---------- */
function viewModel() {
  return `<div class="analysis"><div class="eyebrow">Modelo Econômico Integrado</div><h3>Decomposição do preço final do fertilizante</h3><p>O preço final do fertilizante é função de quatro variáveis principais: <b>câmbio</b>, <b>preço FOB internacional</b>, <b>gás natural</b> (que pressiona o FOB) e <b>frete marítimo</b>. Câmbio e FOB representam, juntos, mais de 80% da sensibilidade do preço final.</p></div>
  <div class="panel nomb"><div class="panel-head"><div><div class="panel-title">Análise de Sensibilidade</div><div class="panel-sub">Impacto no preço final por 1% de variação na variável</div></div><span class="panel-badge">MODELO</span></div><div class="chart-box"><canvas id="mdSens"></canvas></div></div>
  <div class="panel nomb"><div class="panel-head"><div><div class="panel-title">Simulador Interativo de Preço · Ureia CIF Brasil</div><div class="panel-sub">Ajuste as variáveis para projetar o impacto no preço final</div></div></div>
    <div class="sim-grid">
      <div class="sim-sliders">
        <div class="slider-row"><div class="sh"><span class="sname">Câmbio</span><span class="sval"><span id="sv-cambio">5,19</span><span class="su">R$/US$</span></span></div><input type="range" id="sl-cambio" min="4.0" max="6.5" step="0.01" value="5.19"><div class="sr"><span>4,0</span><span>6,5</span></div></div>
        <div class="slider-row"><div class="sh"><span class="sname">Preço FOB Ureia</span><span class="sval"><span id="sv-fob">491</span><span class="su">US$/t</span></span></div><input type="range" id="sl-fob" min="300" max="650" step="1" value="491"><div class="sr"><span>300</span><span>650</span></div></div>
        <div class="slider-row"><div class="sh"><span class="sname">Gás Natural Henry Hub</span><span class="sval"><span id="sv-gas">3,10</span><span class="su">US$/MMBtu</span></span></div><input type="range" id="sl-gas" min="1.5" max="4.5" step="0.05" value="3.10"><div class="sr"><span>1,5</span><span>4,5</span></div></div>
        <div class="slider-row"><div class="sh"><span class="sname">Baltic Dry Index</span><span class="sval"><span id="sv-bdi">2.667</span><span class="su">pontos</span></span></div><input type="range" id="sl-bdi" min="1400" max="3300" step="10" value="2667"><div class="sr"><span>1.400</span><span>3.300</span></div></div>
      </div>
      <div class="sim-result"><div class="rl">Preço Projetado · Ureia CIF Brasil</div><div class="rv tnum">R$ <span id="simPrice">2.940</span></div><div class="rd">vs. base: <span class="chip tnum" id="simDelta">0,0%</span></div><div class="rb">Base de cálculo (Jun/26): R$ 2.940/t<br>Câmbio base: R$ 5,19 · FOB base: US$ 491</div></div>
    </div>
  </div>`;
}
function simPriceFn(cambio, fob, gas, bdi) {
  const freteMaritimo = (bdi/2242)*180;
  const gasPremium = (gas-2.85)*60;
  return (fob+gasPremium)*cambio + freteMaritimo + 100;
}
const SIM_BASE = simPriceFn(5.19,491,3.10,2667);
function renderModelCharts() {
  const sctx=document.getElementById("mdSens");
  if(sctx) charts["mdSens"]=new Chart(sctx,{ type:"bar",
    data:{ labels:sensitivity.map(s=>s.variavel), datasets:[{ data:sensitivity.map(s=>s.impacto), backgroundColor:sensitivity.map(s=>colByName(s.cor)), borderRadius:4 }] },
    options:Object.assign(baseOpts(),{ indexAxis:"y", plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.x.toFixed(2)+"%"}}}, scales:{ y:{grid:{display:false},ticks:{color:C.fg,font:{size:10}}}, x:{grid:{color:C.border},ticks:{color:C.muted,font:{size:9.5},callback:v=>(v*100).toFixed(0)+"%"}} } }) });
  // wire sliders
  const ids=["cambio","fob","gas","bdi"];
  const fmtBy={ cambio:v=>v.toFixed(2).replace(".",","), fob:v=>Math.round(v).toString(), gas:v=>v.toFixed(2).replace(".",","), bdi:v=>Math.round(v).toLocaleString("pt-BR") };
  function recompute(){
    const cambio=parseFloat(document.getElementById("sl-cambio").value);
    const fob=parseFloat(document.getElementById("sl-fob").value);
    const gas=parseFloat(document.getElementById("sl-gas").value);
    const bdi=parseFloat(document.getElementById("sl-bdi").value);
    document.getElementById("sv-cambio").textContent=fmtBy.cambio(cambio);
    document.getElementById("sv-fob").textContent=fmtBy.fob(fob);
    document.getElementById("sv-gas").textContent=fmtBy.gas(gas);
    document.getElementById("sv-bdi").textContent=fmtBy.bdi(bdi);
    const price=simPriceFn(cambio,fob,gas,bdi);
    const delta=((price-SIM_BASE)/SIM_BASE)*100;
    document.getElementById("simPrice").textContent=Math.round(price).toLocaleString("pt-BR");
    const dEl=document.getElementById("simDelta");
    dEl.textContent=(delta>=0?"+":"")+delta.toFixed(1).replace(".",",")+"%";
  }
  ids.forEach(id=>{ const el=document.getElementById("sl-"+id); if(el) el.addEventListener("input",recompute); });
  recompute();
}

};
function destroyCharts(){ Object.keys(charts).forEach(k=>{try{charts[k].destroy()}catch(e){} delete charts[k];}); }
function renderNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML=SECTIONS.map(s=>`<button data-id="${s.id}" class="${s.id===activeSection?'active':''}">${ICONS[s.id]}${s.title}</button>`).join("");
  nav.querySelectorAll("button").forEach(b=>b.addEventListener("click",function(){ switchTo(b.dataset.id); }));
}
function switchTo(id){
  activeSection=id;
  const sec=SECTIONS.find(s=>s.id===id);
  document.getElementById("pageTitle").textContent=sec.title;
  document.getElementById("pageSub").textContent=sec.sub;
  renderNav();
  destroyCharts();
  document.getElementById("content").innerHTML='<div class="view active">'+BUILDERS[id].html()+'</div>';
  requestAnimationFrame(function(){ BUILDERS[id].charts(); });
}
document.getElementById("btnExport").addEventListener("click",function(){ window.print(); });
renderNav();
switchTo("overview");
